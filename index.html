<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mile High Sky Cam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="logo.png" alt="MHSC Logo" class="logo">
        <h1>Mile High Sky Cam</h1>
    </header>
    <h3 id="status-text">Checking status...</h3>
    
    <div id="player-container">
        <div class="offline-msg" id="placeholder">Loading...</div>
    </div>

    <script>
        // Add a cache-busting timestamp so the browser always fetches the latest status
        fetch('status.json?t=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                const statusText = document.getElementById('status-text');
                const container = document.getElementById('player-container');
                
                if (data.is_live && data.video_id) {
                    // DEAD MAN'S SWITCH: Verify the timestamp isn't stale (> 24.5 hours)
                    const lastUpdate = new Date(data.updated_at);
                    const now = new Date();
                    const diffHours = (now - lastUpdate) / (1000 * 60 * 60);

                    if (diffHours <= 24.5) {
                        statusText.innerText = "🔴 LIVE NOW";
                        statusText.style.color = "#ff4444";
                        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${data.video_id}?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                    } else {
                        console.warn("Status is stale (>24.5h old). Applying Dead Man's Switch.");
                        statusText.innerText = "⚫ OFFLINE";
                        statusText.style.color = "#888";
                        container.innerHTML = `<div class="offline-msg">We are currently down for daily maintenance or experiencing technical difficulties.</div>`;
                    }
                } else {
                    statusText.innerText = "⚫ OFFLINE";
                    statusText.style.color = "#888";
                    container.innerHTML = `<div class="offline-msg">The stream is currently offline.</div>`;
                }
            })
            .catch(error => {
                document.getElementById('status-text').innerText = "Status Unknown";
            });
    </script>
</body>
</html>
