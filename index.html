<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mile High Sky Cam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <img src="banner.png" alt="Mile High Sky Cam Banner" class="banner">
    </header>
    
    <div id="status-text" class="status-badge offline">Checking status...</div>
    
    <div id="player-container">
        <div class="offline-msg" id="placeholder">Loading...</div>
    </div>

    <footer>
        <p>&copy; <span id="current-year"></span> Mile High Sky Cam. All rights reserved.</p>
        <p>For media or commercial licensing, contact <a href="mailto:admin@milehighskycam.com">admin@milehighskycam.com</a></p>
    </footer>

    <script>
        // Set current year in footer
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Add a cache-busting timestamp so the browser always fetches the latest status
        fetch('status.json?t=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                const statusText = document.getElementById('status-text');
                const container = document.getElementById('player-container');
                
                if (data.is_live && data.video_id) {
                    // DEAD MAN'S SWITCH: Verify the timestamp isn't stale (> 24.5 hours)
                    const lastUpdate = new Date(data.updated_at);
                    const now = new Date();
                    const diffHours = (now - lastUpdate) / (1000 * 60 * 60);

                    if (diffHours <= 24.5) {
                        statusText.innerHTML = '<span class="pulse-dot"></span> LIVE NOW';
                        statusText.className = "status-badge live";
                        container.classList.add("live-glow");
                        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${data.video_id}?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                    } else {
                        console.warn("Status is stale (>24.5h old). Applying Dead Man's Switch.");
                        statusText.innerText = "OFFLINE";
                        statusText.className = "status-badge offline";
                        container.classList.remove("live-glow");
                        container.innerHTML = `<div class="offline-msg">We are currently down for daily maintenance or experiencing technical difficulties.</div>`;
                    }
                } else {
                    statusText.innerText = "OFFLINE";
                    statusText.className = "status-badge offline";
                    container.classList.remove("live-glow");
                    container.innerHTML = `<div class="offline-msg">The stream is currently offline.</div>`;
                }
            })
            .catch(error => {
                const statusText = document.getElementById('status-text');
                statusText.innerText = "STATUS UNKNOWN";
                statusText.className = "status-badge offline";
            });
    </script>
</body>
</html>
